services:
  - type: web
    name: vidyamitra-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: MODEL_NAME
        value: gemini-2.0-flash
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: '["https://vidyamitra.vercel.app"]'
      - key: PYTHON_VERSION
        value: "3.11.0"
